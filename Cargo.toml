[package]
name = "checkit"
version = "0.0.1"
edition = "2024"

[dependencies]
gtk = { version = "0.10.0", package = "gtk4", features = ["v4_12"] }
gio = "0.21.5"
adw = { version = "0.8.1", package = "libadwaita", features = ["v1_8"] }
serde_json = "1.0.149"
serde = { version = "1.0.228", features = ["derive"] }
sl = {git = "https://github.com/rdYards/sl.git"}

[build-dependencies]
glib-build-tools = "0.22.0"