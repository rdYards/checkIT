name: Release Bundles

on:
  push:
    tags:
      - "v*"

jobs:
  # Deb, RPM
  linux-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config \
            libglib2.0-dev \
            build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Cargo Tools
        run: |
          cargo install cargo-bundle
          cargo install cargo-generate-rpm

      - name: Build Debian Package
        run: cargo bundle --format deb --release

      - name: Build RPM Package
        run: cargo generate-rpm

      - name: Consolidate Artifacts
        run: |
          mkdir -p target/release/packages
          cp target/release/bundle/deb/*.deb target/release/packages/ || true
          cp target/generate-rpm/*.rpm target/release/packages/ || true

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: target/release/packages/

  macos-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install System Dependencies
        run: brew install gtk4 libadwaita pkgconf meson

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Cargo Tools
        run: cargo install cargo-bundle

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create Bundle
        run: cargo bundle --format osx --release

      - name: Zip macOS Bundle
        run: |
          cd target/release/bundle/osx && \
          zip -r ../../CheckIT-macos.zip CheckIT.app

      - name: Upload Universal Bundle
        uses: actions/upload-artifact@v7
        with:
          name: universal-macos-bundle
          path: target/release/CheckIT-macos.zip

  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install MSYS2 and Toolchain
        run: |
          choco install msys2 -y
          echo 'C:\msys64\ucrt64\bin' >> $GITHUB_PATH
          echo 'C:\msys64\usr\bin' >> $GITHUB_PATH

      - name: Setup UCRT64 Environment and Install Dependencies
        run: |
          # Run inside MSYS2 UCRT64 shell
          & C:\msys64\usr\bin\bash.exe -l -c "
            # Update pacman and install toolchain
            pacman -Syu --noconfirm --needed \
              mingw-w64-ucrt-x86_64-toolchain \
              mingw-w64-ucrt-x86_64-gtk4 \
              mingw-w64-ucrt-x86_64-libadwaita \
              mingw-w64-ucrt-x86_64-glib2 \
              mingw-w64-ucrt-x86_64-pkg-config
          "

      - name: Configure Environment for Rust
        run: |
          echo 'PKG_CONFIG_ALLOW_CROSS=1' >> $GITHUB_ENV
          echo 'PKG_CONFIG_PATH=C:\msys64\ucrt64\lib\pkgconfig' >> $GITHUB_ENV
          echo 'CC=C:\msys64\ucrt64\bin\gcc.exe' >> $GITHUB_ENV
          echo 'CXX=C:\msys64\ucrt64\bin\g++.exe' >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install Cargo Tools
        run: cargo install cargo-bundle

      - name: Build and Bundle
        run: |
          cargo build --release --target x86_patents-pc-windows-gnu
          cargo bundle --format msi --release

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-packages
          path: |
            target/release/*.msi

  release:
    name: Create Release
    needs: [linux-release, macos-release, windows-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/linux-packages/*.deb
            artifacts/linux-packages/*.rpm
            artifacts/windows-packages/*.msi
            artifacts/universal-macos-bundle/CheckIT-macos.zip
          generate_release_notes: tru
