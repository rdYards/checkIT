name: Release Bundles

on:
  push:
    tags:
      - "v*"

jobs:
  # FLATPAK RELEASE
  flatpak-release:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python3 -m pip install aiohttp tomlkit

      - name: Generate cargo sources
        run: |
          python3 data/build/flatpak-cargo-generator.py -o cargo-sources.json Cargo.lock

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: org.rdyards.CheckIT.yml
          bundle: checkit.flatpak

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-package
          path: checkit.flatpak

  # Deb, RPM
  linux-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config \
            libglib2.0-dev \
            build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Cargo Tools
        run: |
          cargo install cargo-bundle
          cargo install cargo-generate-rpm

      - name: Build Debian Package
        run: cargo bundle --format deb --release

      - name: Build RPM Package
        run: cargo generate-rpm

      - name: Consolidate Artifacts
        run: |
          mkdir -p target/release/packages
          cp target/release/bundle/deb/*.deb target/release/packages/ || true
          cp target/generate-rpm/*.rpm target/release/packages/ || true

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: target/release/packages/

  macos-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install System Dependencies
        run: brew install gtk4 libadwaita meson

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Cargo Tools
        run: cargo install cargo-bundle

      - name: Build aarch64
        env:
          SDKROOT: $(xcrun --sdk macosx --show-sdk-path)
          MACOSX_DEPLOYMENT_TARGET: 14.0
        run: cargo build --release --target aarch64-apple-darwin

      - name: Remove Quarantine Attribute
        run: |
          xattr -rd com.apple.quarantine target/release || true

      - name: Create Bundle
        run: cargo bundle --format osx --release

      - name: Ad-hoc Sign App
        run: |
          codesign --deep -s - target/release/bundle/osx/CheckIT.app

      - name: Zip macOS Bundle
        run: |
          cd target/release/bundle/osx && \
          zip -r ../../CheckIT-macos.zip CheckIT.app

      - name: Upload Universal Bundle
        uses: actions/upload-artifact@v7
        with:
          name: universal-macos-bundle
          path: target/release/CheckIT-macos.zip

  # Commenting out until a solution can be found
