name: Release Bundles

on:
  push:
    tags:
      - "v*"

jobs:
  # Deb, RPM
  linux-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config \
            libglib2.0-dev \
            build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Cargo Tools
        run: |
          cargo install cargo-bundle
          cargo install cargo-generate-rpm

      - name: Build Debian Package
        run: cargo bundle --format deb --release

      - name: Build RPM Package
        run: cargo generate-rpm

      - name: Consolidate Artifacts
        run: |
          mkdir -p target/release/packages
          cp target/release/bundle/deb/*.deb target/release/packages/ || true
          cp target/generate-rpm/*.rpm target/release/packages/ || true

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: target/release/packages/

  macos-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install System Dependencies
        run: brew install gtk4 libadwaita meson

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Cargo Tools
        run: cargo install cargo-bundle

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create Bundle
        run: cargo bundle --format osx --release

      - name: Zip macOS Bundle
        run: |
          cd target/release/bundle/osx && \
          zip -r ../../CheckIT-macos.zip CheckIT.app

      - name: Upload Universal Bundle
        uses: actions/upload-artifact@v7
        with:
          name: universal-macos-bundle
          path: target/release/CheckIT-macos.zip

  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install MSYS2 and GLib
        uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          install: >-
            base-devel,
            mingw-w64-ucrt-x86_64-gtk4,
            mingw-w64-ucrt-x86_64-pkg-config

      - name: Configure Environment
        run: |
          echo 'PKG_CONFIG_ALLOW_CROSS=1' >> $GITHUB_ENV
          echo 'PKG_CONFIG_PATH=/ucrt64/lib/pkgconfig' >> $GITHUB_ENV
        shell: bash

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Cargo Bundle
        run: cargo install cargo-bundle

      - name: Build and Bundle
        run: |
          cargo build --release --target x86_64-pc-windows-msvc
          cargo bundle --format msi --release --target x86_64-pc-windows-msvc
        shell: bash

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-packages
          path: target/wix/*.msi

  release:
    name: Create Release
    needs: [linux-release, macos-release, windows-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/linux-packages/*.deb
            artifacts/linux-packages/*.rpm
            artifacts/windows-packages/*.msi
            artifacts/universal-macos-bundle/CheckIT-macos.zip
          generate_release_notes: tru
