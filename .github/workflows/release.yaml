  release:
    name: Create Release
    needs: [linux-release, macos-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/linux-packages/*.deb
            artifacts/linux-packages/*.rpm
            artifacts/windows-packages/*.msi
            artifacts/universal-macos-bundle/CheckIT-macos.zip
          generate_release_notes: true
