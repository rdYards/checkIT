app-id: org.rdyards.CheckIT
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: checkit
finish-args:
  - "--own-name=org.rdyards.CheckIT"
  - "--share=ipc"
  - "--socket=wayland"
  - "--socket=fallback-x11"
  - "--filesystem=home"
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

modules:
  - name: checkit
    buildsystem: simple
    build-options:
      build-args:
        - "--share=network"
      env:
        PATH: "/usr/lib/sdk/rust-stable/bin:/app/bin:/usr/bin"
        CARGO_HOME: "/run/build/checkit/.cargo"
        RUSTUP_HOME: "/run/build/checkit/.rustup"
    build-commands:
      - cargo fetch --manifest-path Cargo.toml --locked
      - cargo build --release --frozen
      - cargo install --path . --root /app
    sources:
      - type: file
        path: cargo-sources.json
      - type: dir
        path: .
    post-install:
      - install -Dm644 LICENSE /app/share/licenses/org.checkit.CheckIT/LICENSE
      - install -Dm644 data/build/checkit.desktop /app/share/applications/checkit.desktop
      - install -Dm644 data/build/org.rdyards.CheckIT.svg /app/share/icons/hicolor/scalable/apps/org.rdyards.CheckIT.svg
